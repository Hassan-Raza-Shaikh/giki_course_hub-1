{% extends 'base.html' %}
{% block title %}Sign Up — GIKI Course Hub{% endblock %}

{% block auth_content %}
<div class="auth-outer">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">🎓</div>
      <h1>Create Account</h1>
      <p>Join GIKI Course Hub today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.signup') }}">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text" class="form-control" placeholder="Choose a username" required autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary w-full mt-2" style="justify-content:center;">
        Create Account →
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
