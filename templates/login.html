{% extends 'base.html' %}
{% block title %}Login — GIKI Course Hub{% endblock %}

{% block auth_content %}
<div class="auth-outer">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">📚</div>
      <h1>GIKI Course Hub</h1>
      <p>Welcome back — sign in to continue</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text" class="form-control" placeholder="Enter your username" required autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary w-full mt-2" style="justify-content:center;">
        Sign In →
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up</a>
    </div>
  </div>
</div>
{% endblock %}
